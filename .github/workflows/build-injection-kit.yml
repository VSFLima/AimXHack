name: Build AimXHack

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;26.1.10909125"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Extract native libraries
        run: |
          mkdir -p injection_kit/lib/armeabi-v7a
          mkdir -p injection_kit/lib/arm64-v8a
          mkdir -p injection_kit/smali
          
          # Extract .so from built APK
          cd app/build/outputs/apk/debug/
          unzip -o app-debug.apk "lib/*" -d /tmp/extracted
          cp /tmp/extracted/lib/armeabi-v7a/libaimxhack.so /home/runner/work/AimXHack/AimXHack/injection_kit/lib/armeabi-v7a/
          cp /tmp/extracted/lib/arm64-v8a/libaimxhack.so /home/runner/work/AimXHack/AimXHack/injection_kit/lib/arm64-v8a/
          
          # Copy smali files
          cp /home/runner/work/AimXHack/AimXHack/app/src/main/smali/*.smali /home/runner/work/AimXHack/AimXHack/injection_kit/smali/

      - name: Upload injection kit
        uses: actions/upload-artifact@v4
        with:
          name: aimxhack-injection-kit
          path: injection_kit/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: aimxhack-debug
          path: app/build/outputs/apk/debug/*.apk
